  papers:
    target: content/papers
    default_tags: ["PGS", "paper"]
    # Per-paper `doi:` and `pdf:` may be added later (Phase 7 / Zenodo); when present
    # the ingest renders a DOI link + PDF download line at the top of the page.
    entries:
      - src: doc/techpaper_protocol-governed_systems_v2.md
        slug: pgs-constitutionally-constrained-architecture
        title: "Protocol-Governed Systems: A Constitutionally Constrained Architecture for Autonomous and AI-Generated Software"
      - src: doc/pgs_architecture_inversion_concepts_v0.md
        slug: architecture-inversion-concepts
        title: "Protocol-Governed Systems: Architecture Inversion Concepts"
      - src: doc/pgs_conceptual_model_v0.md
        slug: conceptual-model
        title: "Protocol-Governed Systems: A Conceptual Model"
      - src: doc/pgs_compiler_conceptual_model_v0.md
        slug: compiler-conceptual-model
