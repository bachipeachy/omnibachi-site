baseURL = "https://omnibachi.org/"
title = "omnibachi"
theme = "PaperMod"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

pagination.pagerSize = 10

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  description = "Protocol-Governed Systems — blogs, papers, and a practitioner guide by Bhash Ganti."
  author = "Bhash Ganti"
  # Home page shows only the high-level PGS hero (homeInfoParams) — no post feed.
  # Empty mainSections suppresses the home list (otherwise Hugo defaults to the
  # largest section, 'book', flooding the home page with chapter links).
  # Navigation to Blog/Papers/Book/Learn lives in the top menu.
  mainSections = []
  # Fallback social-share image for pages without their own cover (home, about, etc.).
  images = ["og-default.png"]
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  ShowWordCount = true
  # Comments are rendered by layouts/_partials/comments.html (giscus). Enabled
  # globally; book chapters opt out via cascade in content/book/_index.md.
  comments = true

  [params.assets]
    favicon = "/favicon.ico"
    favicon16x16 = "/favicon-16x16.png"
    favicon32x32 = "/favicon-32x32.png"
    apple_touch_icon = "/apple-touch-icon.png"
    safari_pinned_tab = "/safari-pinned-tab.svg"
    theme_color = "#2e2e33"
    msapplication_TileColor = "#2e2e33"

  [params.homeInfoParams]
    Title = "Welcome to OmniBachi"
    Content = """
The home of **Protocol-Governed Systems (PGS)** — an open-source architecture for building trustworthy software, AI agents, autonomous systems, and digital ecosystems through explicit protocol, governance, and verifiable execution.

> Governed by Protocol. Constructed by Compiler. Proven by Trace.

#### The problem

Modern software has a governance problem. As systems become distributed, event-driven, AI-assisted, and increasingly machine-generated, the gap keeps widening between what engineers *intended* and what software is actually *allowed to do*. Behavior hides in orchestration code, runtime conditionals, framework conventions, implicit routing, service glue — and, increasingly, in AI-generated implementation details no human reviewed.

PGS starts from a different question: **what if behavior were governed *before* execution instead of inferred *during* it?**

#### What PGS is

PGS is a **Protocol-Governed Execution Architecture**, where:

- behavior is declared in governed protocol artifacts,
- admissible execution paths are compiled ahead of time,
- runtime traversal is deterministic,
- undeclared behavior is simply unreachable,
- and every execution produces structured, immutable evidence.

The runtime does not "figure out" what to do — it traverses a precompiled execution graph. The compiler constrains what the runtime is even *capable* of doing. This is not another framework abstraction; it is a different execution model.

#### Two spaces, cleanly separated

PGS splits software into a **Human Governance Space** that defines what behavior is admissible, and a **Machine Execution Space** that executes only what has already been declared and compiled. The runtime is never trusted to "do the right thing" — it is structurally incapable of doing anything else.

#### Why this matters in the AI era

AI can now generate software faster than humans can reliably govern it. PGS is built on a simple premise: **AI-generated behavior should not bypass architectural admissibility.** Execution legality is compiled before runtime, side effects are explicitly declared, routing surfaces are closed, and traces are immutable — so the system cannot invent undeclared behavior at execution time. PGS even governs *how the system itself changes*: every change travels a gated pipeline from a plain-language Change Request to an Authoring Mandate. *The actor proposes; governance disposes.*

#### What PGS is *not*

It is not a low-code workflow builder, a BPM engine, an orchestration DSL, a rules engine, an agent framework, or another event-bus abstraction. It is a **governed execution substrate**.

#### Who it's for

Engineers building high-integrity systems · teams integrating AI-generated code safely · architects exploring deterministic execution models · technical leaders and investors evaluating where AI-era software governance is heading.

Explore the ecosystem from the menu above — **Blog**, **Papers**, **Book**, **Learn**, and **Open Source**.
"""

  [params.profileMode]
    enabled = false

  # giscus (GitHub Discussions-backed comments).
  # Fill repoId + categoryId from https://giscus.app after the public repo exists
  # and Discussions are enabled. Until repoId is set (still the REPLACE_* value),
  # comments.html renders nothing — so the site is safe to deploy beforehand.
  [params.giscus]
    repo = "bachipeachy/omnibachi-site"
    repoId = "REPLACE_WITH_REPO_ID"
    category = "Comments"
    categoryId = "REPLACE_WITH_CATEGORY_ID"
    mapping = "pathname"
    strict = "0"
    reactionsEnabled = "1"
    emitMetadata = "0"
    inputPosition = "bottom"
    lang = "en"

[outputs]
  home = ["HTML", "RSS", "JSON"]

# Tier-1 top menu
[menu]
  [[menu.main]]
    identifier = "blog"
    name = "Blog"
    url = "/blog/"
    weight = 10
  [[menu.main]]
    identifier = "papers"
    name = "Papers"
    url = "/papers/"
    weight = 20
  [[menu.main]]
    identifier = "book"
    name = "Book"
    url = "/book/"
    weight = 30
  [[menu.main]]
    identifier = "learn"
    name = "Learn"
    url = "/learn/"
    weight = 40
  [[menu.main]]
    identifier = "open-source"
    name = "Open Source"
    url = "https://github.com/bachipeachy"
    weight = 42
  [[menu.main]]
    identifier = "use-cases"
    name = "Use Cases"
    url = "/use-cases/"
    weight = 45
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 50
  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 60

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true